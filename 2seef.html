<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHeaven | Persistent Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --admin-bg: #f4f7f6; --sidebar-dark: #1a252f; --accent-gold: #d4af37; }
        body { background: var(--admin-bg) !important; font-family: 'Outfit', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--sidebar-dark); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .sidebar { width: 280px; background: var(--sidebar-dark); color: white; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; }
        .sidebar-brand { font-family: 'Cinzel'; font-size: 1.5rem; margin-bottom: 40px; text-align: center; color: var(--accent-gold); }
        .nav-link { background: none; border: none; color: #a0aec0; padding: 15px 20px; text-align: left; cursor: pointer; font-size: 1rem; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: 0.3s; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        .main-stage { flex-grow: 1; overflow-y: auto; padding: 40px; background: #f8fafc; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-left: 5px solid var(--accent-gold); }
        .stat-card h4 { margin: 0; color: #718096; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; color: var(--sidebar-dark); }

        .tag-container { border: 1px solid #ddd; padding: 8px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 8px; background: white; min-height: 45px; align-items: center; }
        .tag { background: var(--sidebar-dark); color: var(--accent-gold); padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; }
        .tag span { cursor: pointer; color: white; font-weight: bold; font-size: 12px; }
        .tag-input { border: none; outline: none; flex-grow: 1; padding: 5px; font-family: 'Outfit'; font-size: 1rem; }

        .library-table { width: 100%; border-spacing: 0 10px; border-collapse: separate; }
        .table-row td { padding: 15px; background: #fff; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .table-row td:first-child { border-left: 1px solid #eee; border-top-left-radius: 15px; border-bottom-left-radius: 15px; }
        .table-row td:last-child { border-right: 1px solid #eee; border-top-right-radius: 15px; border-bottom-right-radius: 15px; }
        .table-row img { width: 45px; height: 60px; object-fit: cover; border-radius: 6px; }

        .btn-publish { background: var(--sidebar-dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .del-btn { background: #fff5f5; color: #c53030; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body onload="initAdmin()">

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family:'Cinzel';">Admin Access</h1>
            <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:15px; border:2px solid #eee; border-radius:12px; margin-bottom:15px; text-align:center;">
            <div style="margin-bottom: 20px; font-size: 0.9rem; color: #555;">
                <input type="checkbox" id="rememberMe"> <label for="rememberMe">Remember Me</label>
            </div>
            <button onclick="handleLogin()" class="btn-publish">Unlock Dashboard</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar-ui" style="display:none;">
        <div class="sidebar-brand">BookHeaven</div>
        <button class="nav-link active" onclick="switchTab('dash-tab', this)">📊 Dashboard</button>
        <button class="nav-link" onclick="switchTab('upload-tab', this)">📤 Upload Novel</button>
        <div style="margin-top:auto;">
            <a href="index.html" class="nav-link">🌐 View Site</a>
            <button class="nav-link" onclick="logout()" style="color:#fc8181;">🚪 Logout</button>
        </div>
    </aside>

    <main class="main-stage" id="main-ui" style="display:none;">
        <div id="dash-tab" class="section active">
            <h2 style="font-family:'Cinzel';">Welcome, Kalba2seef</h2>
            <div class="stats-grid">
                <div class="stat-card"><h4>Total Novels</h4><p id="stat-count">0</p></div>
                <div class="stat-card"><h4>Security</h4><p style="color:green; font-size:1.1rem;">Verified Session</p></div>
            </div>
            <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
                <table class="library-table">
                    <thead><tr style="text-align: left; color: #718096; font-size: 0.9rem;"><th>Cover</th><th>Details</th><th>Category</th><th>Action</th></tr></thead>
                    <tbody id="collection-list"></tbody>
                </table>
            </div>
        </div>

        <div id="upload-tab" class="section">
            <h2 style="font-family:'Cinzel';">Add Content</h2>
            <div style="background: white; padding: 30px; border-radius: 20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
                    <input type="text" id="title" placeholder="Title" style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="writer" placeholder="Writer" style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                </div>
                <div class="tag-container" id="tag-box" style="margin-bottom:15px;">
                    <input type="text" class="tag-input" id="cat-input" placeholder="Type Category & press >">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <input type="text" id="image" placeholder="Image URL" style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="link" placeholder="PDF Link" style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                </div>
                <button onclick="saveNovel()" class="btn-publish">Upload Now</button>
            </div>
        </div>
    </main>

<script>
    const PWD = "kalba2seef";
    let selectedCategories = [];

    const catInput = document.getElementById('cat-input');
    if(catInput) {
        catInput.addEventListener('keyup', (e) => {
            if (e.key === '>') {
                let val = catInput.value.replace('>', '').trim();
                if (val && !selectedCategories.includes(val)) {
                    selectedCategories.push(val);
                    renderTags();
                }
                catInput.value = '';
            }
        });
    }

    function renderTags() {
        document.querySelectorAll('.tag').forEach(t => t.remove());
        selectedCategories.forEach((cat, i) => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${cat} <span onclick="removeTag(${i})">✕</span>`;
            document.getElementById('tag-box').insertBefore(tag, catInput);
        });
    }

    function removeTag(i) { selectedCategories.splice(i, 1); renderTags(); }

    function saveNovel() {
        const n = { 
            title: document.getElementById('title').value, 
            writer: document.getElementById('writer').value, 
            category: selectedCategories.join(', '), 
            image: document.getElementById('image').value, 
            link: document.getElementById('link').value 
        };
        let b = JSON.parse(localStorage.getItem('myBooks')) || [];
        b.push(n);
        localStorage.setItem('myBooks', JSON.stringify(b));
        alert("Saved!");
        location.reload();
    }

    function updateUI() {
        const list = document.getElementById('collection-list');
        const books = JSON.parse(localStorage.getItem('myBooks')) || [];
        document.getElementById('stat-count').innerText = books.length;
        list.innerHTML = books.map((b, i) => `
            <tr class="table-row">
                <td><img src="${b.image}"></td>
                <td><strong>${b.title}</strong><br><small>${b.writer}</small></td>
                <td><span style="color:var(--accent-gold)">${b.category ? b.category : 'Uncategorized'}</span></td>
                <td><button class="del-btn" onclick="removeBook(${i})">Delete</button></td>
            </tr>`).join('');
    }

    function removeBook(i) { 
        if(confirm("Delete?")) { 
            let b = JSON.parse(localStorage.getItem('myBooks')); 
            b.splice(i,1); 
            localStorage.setItem('myBooks', JSON.stringify(b)); 
            updateUI(); 
        } 
    }

    function initAdmin() {
        if (localStorage.getItem('isRemembered') === 'true') {
            showDashboard();
        }
        updateUI();
    }

    function handleLogin() {
        const enteredPass = document.getElementById('passInput').value;
        if (enteredPass === PWD) {
            const remember = document.getElementById('rememberMe').checked;
            localStorage.setItem('isRemembered', remember);
            showDashboard();
        } else {
            alert("Wrong Password");
        }
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('sidebar-ui').style.display = 'flex';
        document.getElementById('main-ui').style.display = 'block';
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function logout() { 
        localStorage.setItem('isRemembered', 'false');
        location.reload(); 
    }
</script>
</body>
</html>
